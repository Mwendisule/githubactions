name: Unit Tests by Mwendisule

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main
jobs:
  test:
    name: Run All Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings -q
  greetings:
    name: Greet Mwendisule
    runs-on: ubuntu-latest
    steps:
      - name: Greeting
        run: |
          echo "Hello Mwendisule... Great that you are exceling in your coding skills. Keep up the good work!"
    needs: test